version: '3.8'
services:
    # PHP-FPM Service
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        image: portal-berita-php
        container_name: portal-berita-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - portal-berita-network

    # Queue Worker Service
    worker:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        image: portal-berita-php
        container_name: portal-berita-worker
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan queue:work
        volumes:
            - ./:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - portal-berita-network


    # Nginx Service
    web:
        image: nginx:alpine
        container_name: portal-berita-web
        restart: unless-stopped
        ports:
            - "8181:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - portal-berita-network

    # MySQL Service
    db:
        image: mariadb:10.11
        container_name: portal-berita-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - portal-berita-network

    # Redis Service
    redis:
        image: redis:alpine
        container_name: portal-berita-redis
        restart: unless-stopped
        networks:
            - portal-berita-network

networks:
    portal-berita-network:
        driver: bridge

volumes:
    dbdata:
        driver: local
